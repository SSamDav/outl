name: Release

# Triggered by pushing a tag like `v0.1.0-beta.1`. Each tag builds
# release binaries for macOS (arm64 + x64), Linux (x64), and Windows
# (x64), uploads them to the corresponding GitHub Release with
# checksums, and stops. Source archives are auto-generated by GitHub.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: outl-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: outl-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: outl-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: outl-windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin outl

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/outl dist/outl
          cp LICENSE-MIT LICENSE-APACHE README.md dist/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz outl LICENSE-MIT LICENSE-APACHE README.md
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/outl.exe dist/outl.exe
          Copy-Item LICENSE-MIT, LICENSE-APACHE, README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip
          $hash = (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii ${{ matrix.artifact }}.zip.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          fail_on_unmatched_files: false
          draft: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
